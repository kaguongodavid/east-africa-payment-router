<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Africa Payment Router</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #2c3e50; }
        h3 { color: #2c3e50; border-bottom: 2px solid #27ae60; padding-bottom: 5px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #219a52; }
        pre { background: #2c3e50; color: #27ae60; padding: 20px; border-radius: 5px; overflow-x: auto; min-height: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>🌍 East Africa Payment Router</h1>
    <p>Send money across East Africa — enter your details below</p>

    <div class="card">
        <h3>💱 FX Conversion</h3>
        <label>Amount</label>
        <input type="number" id="fx-amount" placeholder="Enter amount e.g. 5000" />
        <label>From Currency</label>
        <select id="fx-from">
            <option value="KES">🇰🇪 KES — Kenyan Shilling</option>
            <option value="UGX">🇺🇬 UGX — Ugandan Shilling</option>
            <option value="TZS">🇹🇿 TZS — Tanzanian Shilling</option>
            <option value="RWF">🇷🇼 RWF — Rwandan Franc</option>
        </select>
        <label>To Currency</label>
        <select id="fx-to">
            <option value="UGX">🇺🇬 UGX — Ugandan Shilling</option>
            <option value="KES">🇰🇪 KES — Kenyan Shilling</option>
            <option value="TZS">🇹🇿 TZS — Tanzanian Shilling</option>
            <option value="RWF">🇷🇼 RWF — Rwandan Franc</option>
        </select>
        <button onclick="convertFX()">Convert</button>
        <pre id="fx-output">Results will appear here...</pre>
    </div>

    <div class="card">
        <h3>🗺️ Payment Routing</h3>
        <label>From Currency</label>
        <select id="route-from">
            <option value="KES">🇰🇪 KES — Kenya</option>
            <option value="UGX">🇺🇬 UGX — Uganda</option>
            <option value="TZS">🇹🇿 TZS — Tanzania</option>
            <option value="RWF">🇷🇼 RWF — Rwanda</option>
        </select>
        <label>To Currency</label>
        <select id="route-to">
            <option value="UGX">🇺🇬 UGX — Uganda</option>
            <option value="KES">🇰🇪 KES — Kenya</option>
            <option value="TZS">🇹🇿 TZS — Tanzania</option>
            <option value="RWF">🇷🇼 RWF — Rwanda</option>
        </select>
        <label>Amount</label>
        <input type="number" id="route-amount" placeholder="Enter amount" />
        <button onclick="routePayment()">Find Route</button>
        <pre id="route-output">Results will appear here...</pre>
    </div>

    <div class="card">
        <h3>💸 Send Money</h3>
        <label>Sender Phone Number</label>
        <input type="text" id="sender-phone" placeholder="+254712345678" />
        <label>Receiver Phone Number</label>
        <input type="text" id="receiver-phone" placeholder="+256712345678" />
        <label>Amount</label>
        <input type="number" id="settle-amount" placeholder="Enter amount" />
        <label>From Currency</label>
        <select id="settle-from">
            <option value="KES">🇰🇪 KES — Kenya</option>
            <option value="UGX">🇺🇬 UGX — Uganda</option>
            <option value="TZS">🇹🇿 TZS — Tanzania</option>
            <option value="RWF">🇷🇼 RWF — Rwanda</option>
        </select>
        <label>To Currency</label>
        <select id="settle-to">
            <option value="UGX">🇺🇬 UGX — Uganda</option>
            <option value="KES">🇰🇪 KES — Kenya</option>
            <option value="TZS">🇹🇿 TZS — Tanzania</option>
            <option value="RWF">🇷🇼 RWF — Rwanda</option>
        </select>
        <button onclick="sendMoney()">Send Money</button>
        <pre id="settle-output">Results will appear here...</pre>
    </div>

    <script>
        async function convertFX() {
            const amount = document.getElementById('fx-amount').value;
            const from = document.getElementById('fx-from').value;
            const to = document.getElementById('fx-to').value;
            if (!amount) { document.getElementById('fx-output').textContent = '❌ Please enter an amount!'; return; }
            document.getElementById('fx-output').textContent = 'Converting...';
            try {
                const res = await fetch(`/api/convert?amount=${amount}&from=${from}&to=${to}`);
                const data = await res.json();
                if (data.error) { document.getElementById('fx-output').textContent = '❌ Error: ' + data.error; return; }
                document.getElementById('fx-output').textContent = `✅ ${Number(amount).toLocaleString()} ${data.from} = ${data.converted.toLocaleString()} ${data.to}\nRate: ${data.rate}`;
            } catch (err) { document.getElementById('fx-output').textContent = '❌ Error: ' + err.message; }
        }

        async function routePayment() {
            const from = document.getElementById('route-from').value;
            const to = document.getElementById('route-to').value;
            const amount = document.getElementById('route-amount').value;
            if (!amount) { document.getElementById('route-output').textContent = '❌ Please enter an amount!'; return; }
            document.getElementById('route-output').textContent = 'Routing...';
            try {
                const res = await fetch(`/api/route?from=${from}&to=${to}&amount=${amount}`);
                const data = await res.json();
                if (data.error) { document.getElementById('route-output').textContent = '❌ Error: ' + data.error; return; }
                document.getElementById('route-output').textContent = `✅ Corridor: ${data.corridor}\nSender Provider: ${data.sender}\nReceiver Provider: ${data.receiver}\nAmount: ${Number(amount).toLocaleString()}\nStatus: ${data.status}`;
            } catch (err) { document.getElementById('route-output').textContent = '❌ Error: ' + err.message; }
        }

        async function sendMoney() {
            const senderPhone = document.getElementById('sender-phone').value;
            const receiverPhone = document.getElementById('receiver-phone').value;
            const amount = document.getElementById('settle-amount').value;
            const from = document.getElementById('settle-from').value;
            const to = document.getElementById('settle-to').value;
            if (!senderPhone || !receiverPhone || !amount) { document.getElementById('settle-output').textContent = '❌ Please fill in all fields!'; return; }
            if (from === to) { document.getElementById('settle-output').textContent = '❌ From and To currencies must be different!'; return; }
            document.getElementById('settle-output').textContent = 'Processing payment...';
            try {
                const res = await fetch('/api/settle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fromCurrency: from, toCurrency: to, amount, senderPhone, receiverPhone })
                });
                const data = await res.json();
                if (data.error) { document.getElementById('settle-output').textContent = '❌ Error: ' + data.error; return; }
                document.getElementById('settle-output').textContent = `✅ Payment Successful!\n\nTransaction ID: ${data.id}\nStatus: ${data.status}\nFrom: ${data.sender.phone} (${data.sender.currency}) - ${Number(data.sender.amount).toLocaleString()}\nTo: ${data.receiver.phone} (${data.receiver.currency}) - ${Number(data.receiver.amount).toLocaleString()}\nRate: ${data.exchangeRate}\nCorridor: ${data.corridor}\nTime: ${data.timestamp}`;
            } catch (err) { document.getElementById('settle-output').textContent = '❌ Error: ' + err.message; }
        }
    </script>
</body>
</html>
